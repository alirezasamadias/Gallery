<!-- START -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Home</title>
    <!-- CSS -->
    <link rel="stylesheet" href="Css/Rest.css">
    <link rel="stylesheet" href="CSS/Gallery.css">
</head>
<body>
    <!-- site loader -->
    <div class="site-loader">
        <div class="loader"></div>
    </div>

    <!-- menu -->
    <header id="header">
        <a href="index.html" class="btn btn_back"></a>
        <button id="animal" class="btn">Animal</button>
        <button id="car" class="btn">Car</button>
        <button id="eye" class="btn">Eye</button>
        <div><button id="all" class="btn">All</button></div>
    </header>
    
    <!-- images -->
    <main id="main">
        <div class="box"><img src="Images/Animal (1).jpg" alt=""></div>
        <div class="box"><img src="Images/Car (1).png" alt=""></div>
        <div class="box"><img src="Images/Eye (1).jpg" alt=""></div>
        <div class="box"><img src="Images/Car (2).jpg" alt=""></div>
        <div class="box"><img src="Images/Animal (2).jpg" alt=""></div>
        <div class="box"><img src="Images/Eye (2).jpg" alt=""></div>
        <div class="box"><img src="Images/Animal (3).jpg" alt=""></div>
        <div class="box"><img src="Images/Car (3).jpg" alt=""></div>
        <div class="box"><img src="Images/Eye (3).jpg" alt=""></div>
        <div class="box"><img src="Images/Animal (4).jpg" alt=""></div>
        <div class="box"><img src="Images/Car (4).jpg" alt=""></div>
        <div class="box"><img src="Images/Eye (4).jpg" alt=""></div>
        <div class="box"><img src="Images/Animal (5).jpg" alt=""></div>
        <div class="box"><img src="Images/Car (5).jpg" alt=""></div>
        <div class="box"><img src="Images/Eye (5).jpg" alt=""></div>
        <div class="box"><img src="Images/Animal (6).jpg" alt=""></div>
        <div class="box"><img src="Images/Car (6).jpg" alt=""></div>
        <div class="box"><img src="Images/Eye (6).jpg" alt=""></div>
        <div class="box"><img src="Images/Animal (7).jpg" alt=""></div>
        <div class="box"><img src="Images/Car (7).jpg" alt=""></div>
        <div class="box"><img src="Images/Car (8).jpg" alt=""></div>

        <!-- show image -->
        <div class="modal">
            <button class="btn_close">&times;</button>

            <a href="" target="_blank"><img src="" alt="" class="modal-image"></a>

            <div>
                <button class="modal-btn btn_perv"></button>
                <button class="modal-btn btn_next"></button>
            </div>
        </div>
    </main>

    <!-- JS -->
    <script src="js/Gallery.js"></script>
</body>
</html>
<!-- THE END -->
